<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Presence Guard</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <main class="login-page">
        <section class="login-card" aria-labelledby="login-title">
            <div class="login-brand">Presence Guard</div>
            <h1 id="login-title">Login</h1>
            <p>Acesso do encarregado</p>
            <form action="confirmar-educandos.html" class="login-form">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Digite o seu email" autocomplete="email" required>
                </div>
                <div class="field">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite a sua senha" autocomplete="current-password" minlength="6" required>
                </div>
                <button type="submit">Entrar</button>
            </form>
            <p class="login-ajuda">Esqueceu-se da password? Contacte a secretaria da escola.</p>
        </section>
    </main>
</body>
</html>
